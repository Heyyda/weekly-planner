# Alembic конфиг для миграций серверной БД.
# Запуск: cd server && alembic upgrade head

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# URL переопределяется в env.py из DATABASE_URL переменной окружения
# (чтобы тот же код работал и локально и на VPS)
sqlalchemy.url = sqlite:///./weekly_planner_local.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
